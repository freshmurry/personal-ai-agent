name = "personal-ai-agent"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# account_id is auto-detected in Cloudflare CI. Do NOT set it here.
# If wrangler asks locally, run: wrangler whoami

# ─── Workers AI ───────────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ─── Durable Objects ──────────────────────────────────────────────────────────
[[durable_objects.bindings]]
name = "AGENT"
class_name = "AgentDO"

[[durable_objects.bindings]]
name = "SESSION"
class_name = "SessionDO"

[[migrations]]
tag = "v1"
new_classes = ["AgentDO", "SessionDO"]

# ─── D1 ───────────────────────────────────────────────────────────────────────
# Run: wrangler d1 create superagent-db  →  paste id below
[[d1_databases]]
binding       = "DB"
database_name = "superagent-db"
database_id   = "768abc87-231f-48bf-9150-3602e099b46c"

# ─── R2 ───────────────────────────────────────────────────────────────────────
# Run: wrangler r2 bucket create superagent-files
[[r2_buckets]]
binding     = "FILES"
bucket_name = "superagent-files"

# ─── Vectorize ────────────────────────────────────────────────────────────────
# Run: wrangler vectorize create superagent-knowledge --dimensions=768 --metric=cosine
[[vectorize]]
binding    = "VECTORIZE"
index_name = "vector-index"

# ─── KV Namespaces ────────────────────────────────────────────────────────────
# Run: wrangler kv namespace create CACHE       →  paste id below
# Run: wrangler kv namespace create OAUTH_STATES →  paste id below
[[kv_namespaces]]
binding = "CACHE"
id      = "042d97e687054c4e8c0102be6f7c8aae"

[[kv_namespaces]]
binding = "OAUTH_STATES"
id      = "1db5a9038d5c4eca9ef085821a20e562"

# ─── Workflows ────────────────────────────────────────────────────────────────
[[workflows]]
binding    = "AUTOMATION_WORKFLOW"
name       = "automation-workflow"
class_name = "AutomationWorkflow"

# ─── Queues ───────────────────────────────────────────────────────────────────
# Run: wrangler queues create superagent-tasks
[[queues.producers]]
binding = "MY_QUEUE"
queue   = "superagent-tasks"

[[queues.consumers]]
queue             = "superagent-tasks"
max_batch_size    = 10
max_batch_timeout = 30
max_retries       = 3

# ─── Static assets ────────────────────────────────────────────────────────────
[assets]
directory = "./public"
binding   = "ASSETS"

# ─── Non-secret vars (safe to commit) ─────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
WORKER_URL  = "https://superagent.YOUR_SUBDOMAIN.workers.dev"

# ─── Cron triggers ────────────────────────────────────────────────────────────
[triggers]
crons = [
  "0 9 * * 1",
  "0 9 * * *",
]

# ─── Local dev ────────────────────────────────────────────────────────────────
[dev]
port           = 8787
local_protocol = "http"
